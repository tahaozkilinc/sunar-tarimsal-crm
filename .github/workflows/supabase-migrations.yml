# =============================================================================
# Supabase migration'larını OTOMATİK ve YALNIZCA BU PROJEYE uygula.
#
# main dalına, supabase/migrations/ altında değişiklik içeren her push'ta
# çalışır ve yeni migration'ları SADECE aşağıdaki bağlantı dizesinin işaret
# ettiği veritabanına gönderir.
#
# GÜVENLİK — neden hesap token'ı DEĞİL, bağlantı dizesi:
#   Supabase access token'ı HESAP düzeyindedir; o hesaptaki TÜM projelere
#   (birden fazla DB'ye) erişir. Bunun yerine tek bir projenin bağlantı dizesini
#   kullanıyoruz; bu dize fiziksel olarak yalnızca O veritabanını işaret eder,
#   başka bir DB'ye ulaşması imkânsızdır. Böylece "diğer DB'yi bozma" riski yok.
#
# GEREKLİ tek GitHub Secret (repo → Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL
#     Supabase → proje (fjpvssfqvhkrisarcbhj) → Settings → Database →
#     "Connection string" → URI. Şu biçimdedir:
#       postgresql://postgres:[ŞİFRE]@db.fjpvssfqvhkrisarcbhj.supabase.co:5432/postgres
#     ([ŞİFRE] yerine gerçek DB şifresini koy; tamamını secret olarak yapıştır.)
#
# NOT: Bu iş yalnızca bu tek DB'ye dokunur; hesaptaki diğer proje etkilenmez.
# =============================================================================
name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {} # gerekirse elle de tetiklenebilir

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Migration'ları uygula (yalnızca bu projeye)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: supabase db push --db-url "$SUPABASE_DB_URL"
